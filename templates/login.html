<!DOCTYPE html>
<html>
<head>
    <title>SGDI - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="login-container">
        <h2>SGDI</h2>
        <p style="color: #666; margin-top: 0;">Sistema de Gestão de Demandas Internas</p>

        <form method="POST" action="/login">
            <div>
                <label>Email:</label><br>
                <input type="email" name="email" required autofocus style="width: 100%; box-sizing: border-box;">
            </div>
            <div>
                <label>Senha:</label><br>
                <input type="password" name="senha" required style="width: 100%; box-sizing: border-box;">
            </div>
            <button type="submit" style="width: 100%; margin-top: 10px;">Entrar</button>
        </form>
    </div>

    <div class="footer">
        <p>SGDI v1.0 - 2024</p>
    </div>
</body>
</html>
