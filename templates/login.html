<!DOCTYPE html>
<html>
<head>
    <title>SGDI - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1f2937, #3b82f6);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ALERT */
        .alert {
            position: absolute;
            top: 20px;
            background-color: #fee2e2;
            color: #991b1b;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        /* CARD LOGIN */
        .login-container {
            background: #ffffff;
            padding: 30px 28px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-container h2 {
            margin: 0;
            font-size: 22px;
            text-align: center;
            color: #1f2937;
        }

        .login-container p {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 13px;
        }

        /* FORM */
        .form-group {
            margin-bottom: 15px;
        }

        .login-container label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #444;
        }

        .login-container input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.2s;
            box-sizing: border-box;
        }

        .login-container input:focus {
            border-color: #3b82f6;
            outline: none;
        }

        /* BUTTON */
        .login-container button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background-color: #3b82f6;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-container button:hover {
            background-color: #2563eb;
        }
    </style>
</head>

<body>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="login-container">
        <h2>SGDI</h2>
        <p>Sistema de Gestão de Demandas Internas</p>

        <form method="POST" action="/login">

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required autofocus>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" required>
            </div>

            <button type="submit">Entrar</button>

        </form>
    </div>

</body>
</html>
